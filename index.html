<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edosa Leta · AI Experience Designer</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23FAF7F2'/%3E%3Ctext x='16' y='23' font-family='Georgia,serif' font-size='20' font-weight='700' fill='%23C4602A' text-anchor='middle'%3EE%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #FAF7F2;
  --ink: #1C1610;
  --terra: #C4602A;
  --blush: #E8C5A8;
  --muted: rgba(28,22,16,0.55);
  --border: rgba(28,22,16,0.1);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--cream);
  color: var(--ink);
  font-family: 'DM Sans', system-ui, sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* GRAIN */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 10;
  pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23g)' opacity='0.04'/%3E%3C/svg%3E");
  animation: grain 0.12s steps(1) infinite;
}
@keyframes grain {
  0%   { background-position: 0 0; }
  25%  { background-position: -40px -20px; }
  50%  { background-position: 20px 30px; }
  75%  { background-position: -10px 15px; }
}

/* BLOBS */
.blob {
  position: fixed; border-radius: 50%;
  filter: blur(80px); pointer-events: none; z-index: 0;
}
.blob1 {
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(212,136,74,.16) 0%, transparent 70%);
  right: -100px; top: -100px;
  animation: drift1 10s ease-in-out infinite;
}
.blob2 {
  width: 380px; height: 380px;
  background: radial-gradient(circle, rgba(232,197,168,.22) 0%, transparent 70%);
  left: -80px; bottom: -80px;
  animation: drift2 13s ease-in-out infinite;
}
@keyframes drift1 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-24px,20px); } }
@keyframes drift2 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(18px,-16px); } }

/* CONTENT */
.container {
  position: relative; z-index: 2;
  display: flex; flex-direction: column;
  align-items: center; text-align: center;
  padding: 40px 24px;
  animation: fadeUp .9s .1s both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(24px); }
  to   { opacity: 1; transform: translateY(0); }
}

.portrait {
  width: 80px; height: 80px; border-radius: 50%;
  object-fit: cover; object-position: center 50%;
  border: 3px solid var(--blush);
  box-shadow: 0 6px 28px rgba(196,96,42,.15);
  margin-bottom: 32px;
}
.portrait-placeholder {
  width: 80px; height: 80px; border-radius: 50%;
  background: var(--blush);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Playfair Display', serif;
  font-size: 22px; font-weight: 700; color: var(--terra);
  margin-bottom: 32px;
}

.eyebrow {
  font-size: 10px; letter-spacing: 0.32em; text-transform: uppercase;
  color: var(--terra); margin-bottom: 20px;
  display: flex; align-items: center; gap: 10px;
}
.eyebrow-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--terra); }

h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(38px, 7vw, 72px);
  font-weight: 900; line-height: .95;
  letter-spacing: -0.03em;
  margin-bottom: 24px;
}
h1 em {
  font-style: italic; color: var(--terra);
}

.sub {
  font-size: 15px; line-height: 1.75;
  color: var(--muted); max-width: 400px;
  margin-bottom: 48px;
}

.status {
  display: flex; align-items: center; gap: 10px;
  font-family: 'DM Mono', monospace;
  font-size: 11px; letter-spacing: 0.1em;
  color: var(--muted);
  background: rgba(28,22,16,.04);
  border: 1px solid var(--border);
  border-radius: 100px;
  padding: 10px 20px;
  margin-bottom: 40px;
}
.status-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--terra);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { opacity: 1; transform: scale(1); }
  50%      { opacity: .5; transform: scale(.8); }
}

.contact-link {
  font-size: 13px; color: var(--muted);
  text-decoration: none; letter-spacing: 0.04em;
  border-bottom: 1px solid var(--border);
  padding-bottom: 2px;
  transition: color .3s, border-color .3s;
}
.contact-link:hover { color: var(--terra); border-color: var(--terra); }

footer {
  position: fixed; bottom: 28px;
  font-size: 11px; letter-spacing: 0.1em;
  color: rgba(28,22,16,.3);
  z-index: 2;
}

@media (max-width: 600px) {
  h1 { font-size: 42px; }
}
</style>
</head>
<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>

<div class="container">
  <img class="portrait" src="./edosa.JPG" alt="Edosa Leta"
    onerror="this.style.display='none';this.nextElementSibling.style.display='flex';" />
  <div class="portrait-placeholder" style="display:none">EL</div>

  <div class="eyebrow">
    <div class="eyebrow-dot"></div>
    Edosa Leta · Senior UX Designer
  </div>

  <h1>Something<br><em>good</em> is<br>coming.</h1>

  <p class="sub">
    Portfolio in progress. I design AI features and interaction systems for products used by millions.
  </p>

  <div class="status">
    <div class="status-dot"></div>
    Currently building · Back soon
  </div>

  <a href="mailto:edosakinfel@gmail.com" class="contact-link">edosakinfel@gmail.com</a>
</div>

<footer>© 2026 Edosa Leta</footer>

</body>
</html>
